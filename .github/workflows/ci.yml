name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Always-on, fully offline: shell syntax + the verdict transform against a
  # checked-in deph report fixture + schema validation. No deph download.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: ShellCheck
        run: shellcheck scripts/*.sh testdata/*.sh
      - name: Install jsonschema
        run: pip install --quiet jsonschema
      - name: Self-test
        run: ./scripts/validate.sh

  # The remediation/triage/threat layer: stdlib-only unit + robustness + golden +
  # security tests, plus a deterministic CLI smoke against a fixture. Fully offline.
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: ShellCheck
        run: shellcheck scripts/remediate.sh
      - name: Byte-compile
        run: python3 -m py_compile remediate/*.py scripts/*.py
      - name: Install packaging (exercises the PEP 440 comparison path)
        run: pip install --quiet packaging
      - name: Unit + robustness + golden + security tests
        working-directory: remediate
        run: python3 -m unittest discover -p 'test_*.py' -v
      - name: Deterministic CLI smoke (no model, no network)
        working-directory: remediate
        run: |
          python3 - <<'PY' > /tmp/fix.json
          import json
          json.dump({"graph":{"image_ref":"smoke:img","os_family":"debian","nodes":{
            "pip:flask":{"type":"pip-package","name":"flask","version":"2.0.0","layer_origin":"application",
              "cves":[{"id":"CVE-X","tier":"reachable","reachable":True,"severity":"HIGH","fix_version":"3.0.0",
              "cvss_vector":"CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"}]}}}}, open("/tmp/fix.json","w"))
          PY
          python3 plan.py /tmp/fix.json   | grep -q "flask" || { echo "plan smoke failed"; exit 1; }
          python3 triage.py /tmp/fix.json | grep -qi "act"   || { echo "triage smoke failed"; exit 1; }
          python3 ssvc.py /tmp/fix.json   | grep -qi "ssvc"  || { echo "ssvc smoke failed"; exit 1; }
          echo "CLI smoke OK"

  # Live end-to-end: downloads a released deph binary and runs the action.
  # Gated on the repo variable DEPH_RELEASE_READY so PR CI stays green until the
  # first emphereio/deph-dist release exists. Flip the variable to "true" (and set
  # DEPH_VERSION) once a release is published.
  integration:
    if: ${{ vars.DEPH_RELEASE_READY == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan a public image (registry path)
        id: scan
        uses: ./
        with:
          image: python:3.12-slim
          deph-version: ${{ vars.DEPH_VERSION }}
          comment-on-pr: off
          artifact-name: deph-report-registry

      - name: Assert verdict shape
        run: |
          test -s "${{ steps.scan.outputs.verdict-json }}"
          python3 - "${{ steps.scan.outputs.verdict-json }}" <<'PY'
          import json, sys
          v = json.load(open(sys.argv[1]))
          for k in ("total", "in_path", "linked", "not_found_in_path"):
              assert isinstance(v["summary"][k], int), k
          assert v["image"]["ref"] == "python:3.12-slim"
          print("verdict OK:", v["summary"])
          PY
          echo "total=${{ steps.scan.outputs.total-cves }} in-path=${{ steps.scan.outputs.in-path-cves }}"

      - name: Gate fails on in-path findings (expected failure)
        id: gate
        continue-on-error: true
        uses: ./
        with:
          image: python:3.12-slim
          deph-version: ${{ vars.DEPH_VERSION }}
          fail-on: any-reachable
          comment-on-pr: off
          upload-artifact: false

      - name: Assert gate behaved (both directions)
        env:
          TRIPPED: ${{ steps.gate.outputs.gate-tripped }}
          OUTCOME: ${{ steps.gate.outcome }}
        run: |
          # The gate step must fail iff it tripped. (Deterministic gate logic is
          # covered offline by scripts/validate.sh; this checks the wiring.)
          echo "gate tripped=$TRIPPED outcome=$OUTCOME"
          if [ "$TRIPPED" = "true" ] && [ "$OUTCOME" != "failure" ]; then
            echo "gate tripped but job did not fail" >&2; exit 1
          fi
          if [ "$TRIPPED" = "false" ] && [ "$OUTCOME" != "success" ]; then
            echo "gate did not trip but job failed" >&2; exit 1
          fi
