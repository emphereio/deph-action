name: e2e

# End-to-end validation: runs the REAL action on real runners against real images
# and asserts every capability. Unlike ci.yml's `validate` job (which uses a fake deph
# stub offline), this downloads the actual deph binary and performs real scans.
#
# - workflow_dispatch: the full capability matrix (registry / local-build / gate / formats).
# - pull_request: the sticky-PR-comment path, which needs a real PR context.

on:
  workflow_dispatch:
    inputs:
      deph-version:
        description: deph release tag to test
        default: v0.1.5
        required: true
  pull_request:

permissions:
  contents: read

env:
  DEPH_VERSION: ${{ inputs.deph-version || 'v0.1.5' }}

jobs:
  # 1. Registry path: deph pulls a public image directly (no local daemon image).
  registry:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: scan
        uses: ./
        with:
          image: python:3.12-slim
          deph-version: ${{ env.DEPH_VERSION }}
          deph-token: ${{ secrets.DEPH_DIST_READ_TOKEN }}
          comment-on-pr: off
          artifact-name: e2e-registry
      - name: Assert verdict + artifacts
        run: |
          v='${{ steps.scan.outputs.verdict-json }}'
          test -s "$v" || { echo "no verdict.json"; exit 1; }
          test -s '${{ steps.scan.outputs.report-html }}' || { echo "no HTML report"; exit 1; }
          test -s '${{ steps.scan.outputs.report-json }}' || { echo "no JSON report"; exit 1; }
          python3 - "$v" <<'PY'
          import json,sys
          d=json.load(open(sys.argv[1]))
          for k in ("total","in_path","linked","not_found_in_path"):
              assert isinstance(d["summary"][k], int), k
          assert d["image"]["ref"]=="python:3.12-slim", d["image"]
          assert d["image"]["source_mode"]=="registry", d["image"]["source_mode"]
          print("registry verdict OK:", d["summary"])
          PY
          echo "outputs: total=${{ steps.scan.outputs.total-cves }} in-path=${{ steps.scan.outputs.in-path-cves }}"
      - name: Assert report.html is self-contained (no external loads, has CSP)
        run: |
          h='${{ steps.scan.outputs.report-html }}'
          test -s "$h" || { echo "no report.html"; exit 1; }
          n=$(grep -oc 'src="https://\|href="https://' "$h" | head -1)
          [ "$n" = "0" ] || { echo "report.html loads $n external resource(s) — not self-contained"; exit 1; }
          grep -q 'Content-Security-Policy' "$h" || { echo "report.html missing CSP"; exit 1; }
          echo "report.html: self-contained (0 external) + CSP present"

  # 2. Local-daemon path: build an image on the runner, deph saves + scans the tar.
  #    Uses the deliberately-vulnerable testdata image so there's an in-path finding.
  local-build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build local image
        run: docker build -t deph-e2e-app:${{ github.sha }} testdata/e2e
      - id: scan
        uses: ./
        with:
          image: deph-e2e-app:${{ github.sha }}
          deph-version: ${{ env.DEPH_VERSION }}
          deph-token: ${{ secrets.DEPH_DIST_READ_TOKEN }}
          comment-on-pr: off
          artifact-name: e2e-local
      - name: Assert local-daemon binding + in-path finding
        run: |
          v='${{ steps.scan.outputs.verdict-json }}'
          python3 - "$v" <<'PY'
          import json,sys
          d=json.load(open(sys.argv[1]))
          assert d["image"]["source_mode"]=="local-daemon", d["image"]["source_mode"]
          assert d["image"]["digest_kind"] in ("tar-sha256","config-id","repo-digest"), d["image"]["digest_kind"]
          ids=[c["id"] for c in d["in_path_cves"]]
          print("digest_kind:", d["image"]["digest_kind"], "| in-path:", ids, "| summary:", d["summary"])
          assert d["summary"]["total"]>0, "expected at least one known CVE"
          PY

  # 3. Gate path: fail-on must FAIL the job when there is an in-path finding.
  gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build -t deph-e2e-app:${{ github.sha }} testdata/e2e
      - id: gate
        continue-on-error: true
        uses: ./
        with:
          image: deph-e2e-app:${{ github.sha }}
          deph-version: ${{ env.DEPH_VERSION }}
          deph-token: ${{ secrets.DEPH_DIST_READ_TOKEN }}
          fail-on: any-reachable
          comment-on-pr: off
          upload-artifact: false
      - name: Assert gate wiring (job fails iff it tripped)
        env:
          TRIPPED: ${{ steps.gate.outputs.gate-tripped }}
          OUTCOME: ${{ steps.gate.outcome }}
        run: |
          echo "tripped=$TRIPPED outcome=$OUTCOME"
          case "$TRIPPED" in true|false) ;; *) echo "gate-tripped not set ('$TRIPPED') — action failed to load/run"; exit 1 ;; esac
          if [ "$TRIPPED" = "true" ] && [ "$OUTCOME" != "failure" ]; then echo "tripped but job did not fail"; exit 1; fi
          if [ "$TRIPPED" = "false" ] && [ "$OUTCOME" != "success" ]; then echo "did not trip but job failed"; exit 1; fi

  # 4. Extra formats: SARIF + CycloneDX SBOM are produced.
  formats:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build -t deph-e2e-app:${{ github.sha }} testdata/e2e
      - id: scan
        continue-on-error: true # private-repo SARIF upload is GHAS-gated; assert files below
        uses: ./
        with:
          image: deph-e2e-app:${{ github.sha }}
          deph-version: ${{ env.DEPH_VERSION }}
          deph-token: ${{ secrets.DEPH_DIST_READ_TOKEN }}
          upload-sarif: "true"
          upload-sbom: "true"
          comment-on-pr: off
          artifact-name: e2e-formats
      # Read the files from the output dir, not the action outputs: on a PRIVATE repo
      # the code-scanning (SARIF) upload is GHAS-gated and fails, which drops the
      # composite action's outputs — but run.sh still wrote the files. (On a public
      # repo the upload succeeds and the outputs are present.)
      - name: Assert SARIF + SBOM produced and well-formed
        run: |
          d="${{ github.workspace }}/deph-report"
          ls -la "$d" || true
          test -s "$d/deph.sarif" || { echo "no SARIF file in $d"; exit 1; }
          test -s "$d/deph.cdx.json" || { echo "no SBOM file in $d"; exit 1; }
          python3 -c "import json; assert json.load(open('$d/deph.sarif'))['version']=='2.1.0'; print('SARIF OK')"
          python3 -c "import json; assert json.load(open('$d/deph.cdx.json'))['bomFormat']=='CycloneDX'; print('SBOM OK')"

  # 5. PR-comment path: needs a real pull_request context. Runs the action with
  #    comment-on-pr=always and asserts the sticky comment landed on the PR.
  pr-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          image: python:3.12-slim
          deph-version: ${{ env.DEPH_VERSION }}
          comment-on-pr: always
          upload-artifact: false
      - name: Assert sticky comment posted
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${{ github.repository }}/issues/${PR}/comments" --jq '.[].body' \
            | grep -q '<!-- deph-action -->' && echo "sticky PR comment posted OK" \
            || { echo "no deph-action sticky comment found on PR #${PR}"; exit 1; }

  # 6. Probe path: the eBPF runtime probe (dynamic) on a Go image must attach
  #    uprobes and confirm >=1 CVE by execution (evidence=traced). Needs Linux +
  #    root; the action elevates via sudo automatically on hosted runners.
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: scan
        uses: ./
        with:
          image: traefik:v3.0
          deph-version: ${{ env.DEPH_VERSION }}
          probe: dynamic
          probe-timeout: 45s
          artifact-name: e2e-probe
      - name: Assert runtime-confirmed (traced) CVEs
        run: |
          v='${{ steps.scan.outputs.verdict-json }}'
          test -s "$v" || { echo "no verdict produced"; exit 1; }
          python3 - "$v" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          inpath = d["summary"]["in_path"]
          traced = [c for c in d.get("in_path_cves", []) if "traced" in (c.get("evidence", "") or "")]
          print(f"in_path={inpath} runtime-confirmed(traced)={len(traced)}")
          assert inpath > 0, "expected in-path CVEs"
          assert len(traced) > 0, "expected >=1 runtime-confirmed (evidence=traced) CVE from the dynamic probe"
          print(f"OK — probe confirmed {len(traced)} CVE(s) by runtime execution")
          PY
