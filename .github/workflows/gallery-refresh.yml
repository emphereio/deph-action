name: gallery-refresh

# Re-scans the curated gallery images (examples/gallery/images.yaml) with the
# published deph release, regenerates the stamped index, and deploys the result
# to GitHub Pages. The gallery is point-in-time and re-scanned on a schedule so
# it never goes stale, and nothing is committed back (no repo history bloat).
#
# Every third-party action is pinned to a full commit SHA. Tags are mutable: the
# tag-rewrite supply-chain attacks (tj-actions, actions-cool/*, codfish/*) all
# moved version tags to a malicious commit. A pinned SHA is immutable and cannot
# be swapped under us. Dependabot proposes SHA bumps.

on:
  schedule:
    - cron: "0 6 * * 3" # Wednesdays 06:00 UTC (feeds Reachability Wednesday)
  workflow_dispatch:
    inputs:
      deph-version:
        description: deph release to scan with
        default: v0.1.3

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DEPH_VERSION: ${{ inputs.deph-version || 'v0.1.3' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: set
        # yq is preinstalled on ubuntu-latest runners.
        run: echo "matrix=$(yq -o=json -I=0 '.scan' examples/gallery/images.yaml)" >> "$GITHUB_OUTPUT"

  scan:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: deph
        uses: ./
        with:
          image: ${{ matrix.image.ref }}
          deph-version: ${{ env.DEPH_VERSION }}
      - name: Stage gallery files
        run: |
          set -euo pipefail
          d="stage/${{ matrix.image.name }}"
          mkdir -p "$d"
          cp "${{ steps.deph.outputs.report-html }}"      "$d/report.html"
          cp "${{ steps.deph.outputs.verdict-json }}"     "$d/verdict.json"
          cp "${{ steps.deph.outputs.summary-markdown }}" "$d/summary.md"
          cp "${{ steps.deph.outputs.report-json }}"      "$d/deph-report.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gallery-${{ matrix.image.name }}
          path: stage/${{ matrix.image.name }}
          retention-days: 7

  publish:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gallery-*
      - name: Assemble and stamp gallery
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          # Overlay each freshly scanned image into examples/gallery/<name>/.
          for dir in artifacts/gallery-*; do
            [ -d "$dir" ] || continue
            name="${dir#artifacts/gallery-}"
            mkdir -p "examples/gallery/$name"
            cp "$dir"/* "examples/gallery/$name/"
          done
          python3 scripts/gen-gallery-index.py \
            --gallery-dir examples/gallery \
            --date "$(date -u +%Y-%m-%d)" \
            --platform linux/amd64 \
            --deph-version "${DEPH_VERSION}"
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: examples
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
