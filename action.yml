name: deph CVE reachability
description: >-
  Which container CVEs are in your execution path vs just noise. A
  dependency-graph layer that complements your scanner.
author: Emphere

branding:
  icon: activity
  color: blue

inputs:
  image:
    description: >-
      Image to analyze. A local image name already built on the runner
      (auto-saved to a tarball and scanned), or a registry reference deph pulls
      directly. Run this after the image is built.
    required: true
  image-digest:
    description: >-
      Content digest to bind the verdict to — e.g. the digest output of
      docker/build-push-action (its steps.<id>.outputs.digest). If empty, the action
      resolves the best available digest and records how strong that binding is (digest_kind).
    required: false
    default: ""
  deph-version:
    description: deph release tag to download (from emphereio/deph-dist releases).
    required: false
    default: v0.1.5
  deph-token:
    description: >-
      Token used to download the deph release binary. Leave empty to use the
      workflow's github.token. Set a PAT only if the deph repo is private.
    required: false
    default: ""
  severity:
    description: "Optional severity filter passed to deph (e.g. critical,high)."
    required: false
    default: ""
  vex:
    description: "Optional VEX document path(s) passed to deph for suppression."
    required: false
    default: ""
  probe:
    description: >-
      Runtime probe (Linux runners only): off | startup | dynamic. 'startup' runs the
      image and observes what loads at startup (eBPF). 'dynamic' also attaches eBPF
      uprobes to vulnerable functions and drives the entrypoint to confirm CVEs reachable
      by execution. Needs a root-capable runner with Docker (GitHub-hosted ubuntu works;
      the action uses sudo automatically). It runs your image, so point it at your own builds.
    required: false
    default: "off"
  probe-timeout:
    description: "Probe window, e.g. 30s. Only used when probe is not off."
    required: false
    default: "30s"
  fail-on:
    description: >-
      Gate the job on in-path findings: none | any-reachable | reachable-high |
      reachable-critical. Always fails LAST, after artifacts are uploaded.
    required: false
    default: none
  upload-sarif:
    description: >-
      Upload a reachable-only SARIF to the code-scanning tab. Opt-in; runs a
      second scan pass. SARIF is not the canonical report (verdict.json is).
    required: false
    default: "false"
  upload-sbom:
    description: >-
      Emit a CycloneDX SBOM (with deph reachability/VEX enrichment). Opt-in;
      runs a second scan pass since deph formats are mutually exclusive.
    required: false
    default: "false"
  comment-on-pr:
    description: "Sticky PR comment: auto (comment on pull_request events) | always | off."
    required: false
    default: auto
  output-directory:
    description: Directory where the report artifacts are written.
    required: false
    default: deph-report
  upload-artifact:
    description: Upload the report directory as a workflow artifact.
    required: false
    default: "true"
  artifact-name:
    description: Name of the uploaded artifact.
    required: false
    default: deph-report
  retention-days:
    description: >-
      Days to retain the uploaded report artifact (GitHub artifact retention / TTL).
      "0" uses the repository default; otherwise 1–90.
    required: false
    default: "0"
  remediate:
    description: >-
      Remediation plan: off | plan. 'plan' turns the scan into a ranked fix plan
      (which upgrade clears which reachable CVEs) and, on PRs, posts it as a sticky
      comment. With no llm-model it posts the deterministic plan; with one it adds
      AI narration and freshness checks.
    required: false
    default: "off"
  mode:
    description: >-
      scan | investigate. 'investigate' skips scanning and answers `question`
      against an existing `report` JSON — this is what the @deph PR bot calls.
    required: false
    default: scan
  question:
    description: "Question to answer when mode=investigate."
    required: false
    default: ""
  report:
    description: "Path to an existing deph report JSON for mode=investigate."
    required: false
    default: ""
  llm-base-url:
    description: >-
      OpenAI-compatible base URL for the remediation model. Works with OpenAI,
      Anthropic (compat endpoint), OpenRouter, Groq, and local runtimes (Ollama,
      vLLM). The model is the user's choice; the tools are the contract.
    required: false
    default: "https://api.openai.com/v1"
  llm-model:
    description: "Model id for remediation. Empty disables AI; the deterministic plan still runs."
    required: false
    default: ""
  llm-api-key:
    description: "API key for the LLM endpoint. Omit for keyless local servers."
    required: false
    default: ""

outputs:
  report-json:
    description: Path to the deph JSON report (source of truth).
    value: ${{ steps.run.outputs.report-json }}
  verdict-json:
    description: Path to the digest-bound deph-action verdict.
    value: ${{ steps.run.outputs.verdict-json }}
  summary-markdown:
    description: Path to the Markdown summary.
    value: ${{ steps.run.outputs.summary-markdown }}
  report-html:
    description: Path to the self-contained HTML report.
    value: ${{ steps.run.outputs.report-html }}
  sarif:
    description: Path to the SARIF file, when upload-sarif is enabled.
    value: ${{ steps.run.outputs.sarif }}
  sbom-cyclonedx:
    description: Path to the CycloneDX SBOM, when upload-sbom is enabled.
    value: ${{ steps.run.outputs.sbom-cyclonedx }}
  image-digest:
    description: The digest the verdict is bound to.
    value: ${{ steps.run.outputs.image-digest }}
  total-cves:
    description: Distinct known CVEs found (deduped by CVE ID).
    value: ${{ steps.run.outputs.total-cves }}
  in-path-cves:
    description: CVEs deph found in the execution path.
    value: ${{ steps.run.outputs.in-path-cves }}
  linked-cves:
    description: CVEs linked/present but not fully traced.
    value: ${{ steps.run.outputs.linked-cves }}
  not-found-in-path-cves:
    description: CVEs present but with no execution path found by deph.
    value: ${{ steps.run.outputs.not-found-in-path-cves }}
  gate-tripped:
    description: "true when fail-on policy matched (the job is failed in a later step)."
    value: ${{ steps.run.outputs.gate-tripped }}
  deph-exit-code:
    description: "deph scan exit code (0 clean, 1 findings, 2 error)."
    value: ${{ steps.run.outputs.deph-exit-code }}
  remediation-markdown:
    description: Path to the remediation plan (mode=scan) or the investigation answer (mode=investigate).
    value: ${{ steps.remediate.outputs.remediation-markdown || steps.investigate.outputs.remediation-markdown }}
  answer:
    description: The investigation answer text (mode=investigate).
    value: ${{ steps.investigate.outputs.answer }}

runs:
  using: composite
  steps:
    # Rolling cache: a unique key per run always saves a fresh DB at job end,
    # while restore-keys restores the most recent prior DB at job start — so the
    # ~50MB grype DB is reused but still refreshes as deph updates it.
    - name: Cache deph vulnerability database
      if: ${{ inputs.mode != 'investigate' }}
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ~/.cache/deph/grype
        key: deph-grype-db-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          deph-grype-db-${{ runner.os }}-

    - name: Run deph
      id: run
      if: ${{ inputs.mode != 'investigate' }}
      shell: bash
      env:
        DEPH_ACTION_PATH: ${{ github.action_path }}
        DEPH_VERSION: ${{ inputs.deph-version }}
        # Metadata defaults must be static strings, so resolve the token fallback here.
        GH_TOKEN: ${{ inputs.deph-token != '' && inputs.deph-token || github.token }}
        DEPH_IMAGE: ${{ inputs.image }}
        DEPH_IMAGE_DIGEST: ${{ inputs.image-digest }}
        DEPH_SEVERITY: ${{ inputs.severity }}
        DEPH_VEX: ${{ inputs.vex }}
        DEPH_PROBE: ${{ inputs.probe }}
        DEPH_PROBE_TIMEOUT: ${{ inputs.probe-timeout }}
        DEPH_FAIL_ON: ${{ inputs.fail-on }}
        DEPH_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        DEPH_UPLOAD_SBOM: ${{ inputs.upload-sbom }}
        DEPH_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
        DEPH_OUTPUT_DIRECTORY: ${{ inputs.output-directory }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
      run: "$DEPH_ACTION_PATH/scripts/run.sh"

    # Remediation plan from the scan (deterministic floor + optional AI narration).
    # Posts its own sticky PR comment; degrades to the deterministic plan with no model.
    - name: Remediation plan
      id: remediate
      if: ${{ inputs.mode != 'investigate' && inputs.remediate == 'plan' }}
      shell: bash
      env:
        DEPH_REMEDIATE_MODE: plan
        DEPH_REMEDIATE_REPORT: ${{ steps.run.outputs.report-json }}
        DEPH_OUTPUT_DIRECTORY: ${{ steps.run.outputs.output-directory }}
        DEPH_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
        DEPH_LLM_BASE_URL: ${{ inputs.llm-base-url }}
        DEPH_LLM_MODEL: ${{ inputs.llm-model }}
        DEPH_LLM_API_KEY: ${{ inputs.llm-api-key }}
        GH_TOKEN: ${{ inputs.deph-token != '' && inputs.deph-token || github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: "${{ github.action_path }}/scripts/remediate.sh"

    # Investigate mode (the @deph bot): answer a question against an existing report.
    - name: Investigate
      id: investigate
      if: ${{ inputs.mode == 'investigate' }}
      shell: bash
      env:
        DEPH_REMEDIATE_MODE: investigate
        DEPH_REMEDIATE_REPORT: ${{ inputs.report }}
        DEPH_REMEDIATE_QUESTION: ${{ inputs.question }}
        DEPH_OUTPUT_DIRECTORY: ${{ inputs.output-directory }}
        DEPH_LLM_BASE_URL: ${{ inputs.llm-base-url }}
        DEPH_LLM_MODEL: ${{ inputs.llm-model }}
        DEPH_LLM_API_KEY: ${{ inputs.llm-api-key }}
      run: "${{ github.action_path }}/scripts/remediate.sh"

    # Capture artifacts BEFORE the SARIF upload and the gate, so a missing
    # security-events permission or a tripped gate never costs you the report.
    - name: Upload report artifact
      if: ${{ inputs.mode != 'investigate' && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.run.outputs.output-directory }}
        if-no-files-found: error
        retention-days: ${{ inputs.retention-days }}

    - name: Upload SARIF to code scanning
      if: ${{ inputs.mode != 'investigate' && inputs.upload-sarif == 'true' && steps.run.outputs.sarif != '' }}
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ steps.run.outputs.sarif }}
        category: deph

    - name: Gate
      if: ${{ inputs.mode != 'investigate' && steps.run.outputs.gate-tripped == 'true' }}
      shell: bash
      env:
        DEPH_GATE_POLICY: ${{ inputs.fail-on }}
        DEPH_GATE_REASON: ${{ steps.run.outputs.gate-reason }}
      run: |
        echo "deph-action: gate '${DEPH_GATE_POLICY}' tripped — ${DEPH_GATE_REASON}" >&2
        exit 1
